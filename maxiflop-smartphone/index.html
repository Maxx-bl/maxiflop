<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="landscape">
    <title>Maxiflop Controller</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section id="login" class="screen">
        <h1>MAXIFLOP</h1>
        <p class="subtitle">Entrez votre pseudo pour rejoindre la partie</p>
        <input type="text" id="nameInput" placeholder="Pseudo" maxlength="15" />
        
        <p class="team-selection-title">Choisissez votre équipe :</p>
        <div class="team-buttons">
            <button class="join-team-btn btn blue" data-team="Equipe1">Équipe 1</button>
            <button class="join-team-btn btn red" data-team="Equipe2">Équipe 2</button>
            <button class="join-team-btn btn yellow" data-team="Equipe3">Équipe 3</button>
        </div>
        
        <p id="status" class="status"></p>
    </section>

    <section id="waiting" class="screen hidden">
        <h2>En attente...</h2>
        <p id="teamInfo">Affectation d'équipe en cours</p>
        <br>
        <h3 id="timerDisplay">En attente de joueurs...</h3>
    </section>

    <section id="controller" class="screen hidden">
        <div class="scoreWrap">
            <div id="scoreText">0</div>
            <div id="rankText">Rang #1 - Équipe bleue</div>
        </div>
        <div class="buttons">
            <button data-color="0" class="btn blue" aria-label="Bleu"></button>
            <button data-color="1" class="btn yellow" aria-label="Jaune"></button>
            <button data-color="2" class="btn red" aria-label="Rouge"></button>
        </div>
        <div id="feedback">Pret ?</div>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script src="./script.js"></script>
</body>
</html>
