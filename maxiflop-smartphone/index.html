<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxiflop</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <section id="login" class="écran">
        <h1 class="page principal">Bienvenue sur Maxiflop</h1>
        <div class="formulaire-participation">
            <input type="text" id="ajout-pseudo" placeholder="Entrez votre pseudo..." maxlength="15">
            <div class="groupe-boutons">
                <button type="button" id="btnQuit" class="btnSec">QUITTER</button>
                <button type="button" id="btnPart" class="btnPrem">PARTICIPER</button>
            </div>
        </div>
    </section>
    <section id="attente" class="écran arriere">
        <p>En attente du début de la partie...</p>
        <div class="chargement"></div>
    </section>
    <section id="jeu" class="écran arriere">
        <div class="bouton">
            <button class="btn Bleu"></button>
            <button class="btn Jaune"></button>
            <button class="btn rouge"></button>
        </div>
        <div id="go">PRÊT ?</div>
    </section>
    <script src="/socket.io/socket.io.js"></script>
    <script>const socket = io();</script>
    <script src="./script.js"></script>

</body>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="landscape">
    <title>Maxiflop Controller</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <section id="login" class="screen">
        <h1>MAXIFLOP</h1>
        <p class="subtitle">Entrez votre pseudo pour rejoindre la partie</p>
        <input type="text" id="nameInput" placeholder="Pseudo" maxlength="15" />
        <button id="joinButton" class="primary">Participer</button>
        <p id="status" class="status"></p>
    </section>

    <section id="waiting" class="screen hidden">
        <h2>En attente...</h2>
        <p id="teamInfo">Affectation d'equipe en cours</p>
    </section>

    <section id="controller" class="screen hidden">
        <div class="scoreWrap">
            <div id="scoreText">0</div>
            <div id="rankText">Rang #1 - Equipe bleue</div>
        </div>
        <div class="buttons">
            <button data-color="0" class="btn blue" aria-label="Bleu"></button>
            <button data-color="1" class="btn yellow" aria-label="Jaune"></button>
            <button data-color="2" class="btn red" aria-label="Rouge"></button>
        </div>
        <div id="feedback">Pret ?</div>
    </section>

    <script src="./script.js"></script>
</body>

</html>
