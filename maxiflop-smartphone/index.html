<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<meta name="screen-orientation" content="landscape">
	<title>Maxiflop Controller</title>
	<link rel="stylesheet" href="./style.css">
</head>
<body>
	<section id="login" class="screen">
		<h1>MAXIFLOP</h1>
		<p class="subtitle">Entrez votre pseudo pour rejoindre la partie</p>
		<input type="text" id="nameInput" placeholder="Pseudo" maxlength="15" />
		<button id="joinButton" class="primary">Participer</button>
		<p id="status" class="status"></p>
	</section>

	<section id="waiting" class="screen hidden">
		<h2>En attente...</h2>
		<p id="teamInfo">Affectation d'equipe en cours</p>
	</section>

	<section id="controller" class="screen hidden">
		<div class="scoreWrap">
			<div id="scoreText">0</div>
			<div id="rankText">Rang #1 - Equipe bleue</div>
		</div>
		<div class="buttons">
			<button data-color="0" class="btn blue" aria-label="Bleu"></button>
			<button data-color="1" class="btn yellow" aria-label="Jaune"></button>
			<button data-color="2" class="btn red" aria-label="Rouge"></button>
		</div>
		<div id="feedback">Pret ?</div>
	</section>

	<script src="./script.js"></script>
</body>
</html>
